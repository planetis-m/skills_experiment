# Cross-platform CI for a Nim project with C dependencies.
#
# Adapt the following placeholders to your project:
#   <package>         – your binary/library name
#   <src/main.nim>    – entry point passed to `nim c`
#   <apt-deps>        – space-separated apt packages (Linux)
#   <brew-deps>       – space-separated Homebrew formulae (macOS)
#   <vcpkg-deps>      – space-separated vcpkg packages (Windows)
#   <vcpkg-features>  – vcpkg feature flags, if any
#
# If your project has no system C dependencies, remove the
# "Install system dependencies" steps entirely.

name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: stable
          repo-token: ${{ github.token }}

      - name: Install Atlas via Nimble
        run: nimble install -y "https://github.com/nim-lang/atlas@#head"

      - name: Install Nim dependencies
        run: atlas install

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y <apt-deps>

      - name: Build
        run: nim c -d:release -o:<package> <src/main.nim>

      - name: Run Tests
        run: nim test

  macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: stable
          repo-token: ${{ github.token }}

      - name: Install Atlas via Nimble
        run: nimble install -y "https://github.com/nim-lang/atlas@#head"

      - name: Install Nim dependencies
        run: atlas install

      - name: Install system dependencies
        run: brew install <brew-deps>

      - name: Build
        run: nim c -d:release -o:<package> <src/main.nim>

      - name: Run Tests
        run: nim test

  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: stable
          repo-token: ${{ github.token }}

      - name: Install Atlas via Nimble
        run: nimble install -y "https://github.com/nim-lang/atlas@#head"

      - name: Install Nim dependencies
        run: atlas install

      - name: Install system dependencies (vcpkg)
        uses: johnwason/vcpkg-action@v7
        id: vcpkg
        with:
          pkgs: <vcpkg-deps>
          triplet: x64-windows-release
          token: ${{ github.token }}

      - name: Build
        shell: pwsh
        env:
          VCPKG_ROOT: ${{ github.workspace }}\vcpkg\installed\x64-windows-release
        run: nim c -d:release -o:<package>.exe <src/main.nim>

      - name: Run Tests
        shell: pwsh
        env:
          VCPKG_ROOT: ${{ github.workspace }}\vcpkg\installed\x64-windows-release
        run: |
          $env:PATH = "$env:VCPKG_ROOT\bin;" + $env:PATH
          nim test
